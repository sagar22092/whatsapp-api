<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WhatsApp Send File Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    input, textarea, button {
      display: block;
      width: 100%;
      margin-bottom: 12px;
      padding: 8px;
    }
    button {
      cursor: pointer;
    }
    pre {
      background: #111;
      color: #0f0;
      padding: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h2>WhatsApp Send File API Test</h2>

  <input type="text" id="apiKey" placeholder="x-api-key" />

  <input
    type="text"
    id="number"
    placeholder="Phone Number (e.g. 8801XXXXXXXXX@c.us)"
  />

  <input
    type="text"
    id="group"
    placeholder="Group ID (optional)"
  />

  <textarea
    id="caption"
    placeholder="Caption (optional)"
  ></textarea>

  <input type="file" id="files" multiple />

  <button onclick="sendFile()">Send File</button>

  <h3>Response</h3>
  <pre id="output"></pre>

  <script>
    async function sendFile() {
      const apiKey = document.getElementById("apiKey").value;
      const number = document.getElementById("number").value;
      const group = document.getElementById("group").value;
      const caption = document.getElementById("caption").value;
      const filesInput = document.getElementById("files");

      const formData = new FormData();

      if (number) formData.append("number", number);
      if (group) formData.append("group", group);
      if (caption) formData.append("caption", caption);

      for (const file of filesInput.files) {
        formData.append("files", file);
      }

      try {
        const res = await fetch("https://whatsapp.birthhelp.top/api/whatsapp/send/file", {
          method: "POST",
          headers: {
            "x-api-key": apiKey,
          },
          body: formData,
        });

        const data = await res.json();
        document.getElementById("output").textContent =
          JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById("output").textContent = err.message;
      }
    }
  </script>

</body>
</html>
