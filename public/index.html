<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WhatsApp Multi Session</title>
  <style>
    body {
      background:#0f172a;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .card {
      background:#020617;
      padding:20px;
      width:360px;
      border-radius:10px;
    }
    input, button {
      width:100%;
      padding:10px;
      margin-top:8px;
      border-radius:6px;
      border:none;
    }
    input {
      background:#020617;
      color:white;
      border:1px solid #334155;
    }
    button {
      background:#22c55e;
      font-weight:bold;
      cursor:pointer;
    }
    img {
      width:100%;
      margin-top:10px;
      background:white;
      padding:6px;
      border-radius:6px;
    }
  </style>
</head>
<body>

<div class="card">
  <h3 style="text-align:center">👤 User Session</h3>

  <input id="username" placeholder="username">

  <button onclick="getQR()">Get QR</button>
  <img id="qr" style="display:none">

  <p id="status">Status: -</p>

  <hr>

  <input id="number" placeholder="8801XXXXXXXXX">
  <input id="message" placeholder="Message">
  <button onclick="sendMsg()">Send Message</button>

  <button style="background:#ef4444" onclick="doLogout()">Logout</button>
</div>

<script>
  const usernameInput = document.getElementById("username");
  const numberInput = document.getElementById("number");
  const messageInput = document.getElementById("message");
  const qr = document.getElementById("qr");
  const status = document.getElementById("status");

  async function getQR() {
    if (!usernameInput.value) {
      alert("Enter username");
      return;
    }

    const res = await fetch("/api/qr", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: usernameInput.value })
    });

    const data = await res.json();

    if (data.qr) {
      qr.src = data.qr;
      qr.style.display = "block";
    }

    status.innerText = data.connected
      ? "🟢 Connected"
      : "🔴 Scan QR";
  }

  async function sendMsg() {
    const res = await fetch("/api/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: usernameInput.value,
        number: numberInput.value,
        message: messageInput.value
      })
    });

    const data = await res.json();
    alert(data.success ? "Sent ✅" : data.error);
  }

  async function doLogout() {
    await fetch("/api/logout", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: usernameInput.value })
    });
    alert("Logged out");
    qr.style.display = "none";
    status.innerText = "Status: -";
  }
</script>

</body>
</html>
