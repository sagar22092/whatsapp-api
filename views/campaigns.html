<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaFastApi | Campaigns</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: #f3f4f6; overflow-x: hidden; }
        .glass-panel { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1f2937; color: white; padding: 16px 20px; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); z-index: 1000; transition: transform 0.3s; transform: translateY(150%); border: 1px solid rgba(255,255,255,0.1); }
        .toast.show { transform: translateY(0); }
        .progress-bar-bg { background-color: #374151; border-radius: 999px; height: 8px; width: 100%; overflow: hidden; margin-top: 8px; }
        .progress-bar-fill { background: linear-gradient(90deg, #10b981, #059669); height: 100%; transition: width 0.5s ease; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        #deleteModal { display:none; }
        #deleteModal.show { display:flex; }
    </style>
</head>
<body class="antialiased selection:bg-emerald-500/30">

    <!-- Navigation injected by /js/nav.js -->
    <script src="/js/nav.js"></script>

    <!-- Main Content -->
    <div class="pb-12 max-w-7xl mx-auto px-4 md:px-6 lg:px-8">
        <script>injectNav('campaigns');</script>
        
        <div class="flex flex-col md:flex-row justify-between items-start mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white mb-2 tracking-tight">Bulk Campaigns</h1>
                <p class="text-gray-400 text-sm">Send messages safely to large audiences with our Anti-Ban humanized queue.</p>
            </div>
            <div>
                <button onclick="openModal()" class="bg-gradient-to-r from-indigo-500 to-blue-600 text-white px-5 py-2.5 rounded-full text-sm font-bold hover:from-indigo-400 hover:to-blue-500 transition-all shadow-lg shadow-indigo-500/25 border border-indigo-400 flex items-center gap-2">
                    <i class="fas fa-plus"></i> New Campaign
                </button>
            </div>
        </div>

        <!-- Campaigns Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="campaignsContainer">
            <!-- Dynamic Injection -->
            <div class="col-span-full py-20 text-center text-gray-500">
                 <i class="fas fa-spinner fa-spin text-3xl mb-4"></i>
                 <p>Loading Campaigns...</p>
            </div>
        </div>
    </div>

    <!-- Custom Delete Confirm Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] items-center justify-center">
        <div class="bg-gray-900 border border-rose-500/30 rounded-2xl p-8 max-w-sm w-full mx-4 shadow-2xl text-center">
            <div class="w-14 h-14 bg-rose-500/10 border border-rose-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-trash text-rose-400 text-xl"></i>
            </div>
            <h3 class="text-white font-bold text-lg mb-2">Delete Campaign?</h3>
            <p class="text-gray-400 text-sm mb-6">This action cannot be undone. All contacts and progress will be permanently removed.</p>
            <div class="flex gap-3 justify-center">
                <button id="deleteCancelBtn" class="px-6 py-2.5 rounded-xl text-sm font-bold text-gray-300 bg-gray-800 border border-gray-700 hover:bg-gray-700 transition">Cancel</button>
                <button id="deleteConfirmBtn" class="px-6 py-2.5 rounded-xl text-sm font-bold text-white bg-rose-600 hover:bg-rose-500 border border-rose-500 transition flex items-center gap-2">
                    <i class="fas fa-trash"></i> Delete Forever
                </button>
            </div>
        </div>
    </div>

    <!-- Create Campaign Modal -->
    <div id="campaignModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center pointer-events-none p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-gray-900 border border-gray-800 rounded-2xl w-full max-w-2xl transform scale-95 transition-transform duration-300 shadow-2xl overflow-hidden pointer-events-auto flex flex-col max-h-[90vh]">
            
            <div class="flex justify-between items-center p-6 border-b border-gray-800 bg-gray-900/50 sticky top-0 z-10">
                <h2 class="text-xl font-bold text-white"><i class="fas fa-bullhorn text-indigo-400 mr-2"></i> Launch Campaign</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors"><i class="fas fa-times text-xl"></i></button>
            </div>

            <div class="p-6 overflow-y-auto space-y-6">
                <!-- Session Select -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Select Sender Session</label>
                    <select id="camSession" class="w-full bg-gray-800 border-gray-700 text-white rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none px-4 py-3 text-sm border transition-shadow">
                        <option value="">Loading sessions...</option>
                    </select>
                </div>

                <!-- Campaign Name -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Campaign Name</label>
                    <input type="text" id="camName" placeholder="e.g. Eid Discount Promo" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm placeholder-gray-500 transition-all">
                </div>

                <!-- Target Numbers -->
                <div id="csvDropzone" class="border-2 border-dashed border-gray-700/50 hover:border-indigo-500/50 transition-colors p-4 rounded-xl">
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Target Numbers <span class="text-gray-500 normal-case ml-1 font-normal">(Drag & Drop CSV / Excel or Type comma separated)</span></label>
                    <textarea id="camNumbers" rows="4" placeholder="Paste numbers here or drag & drop a .csv file..." class="w-full bg-gray-800/50 border border-gray-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm placeholder-gray-500 transition-all resize-y"></textarea>
                    <input type="file" id="csvFileInput" accept=".csv, .txt" class="hidden" onchange="handleCSVSelect(event)">
                    <div class="flex justify-between items-center mt-2">
                         <p class="text-xs text-indigo-400"><i class="fas fa-info-circle mr-1"></i> Invalid/duplicates ignored.</p>
                         <button onclick="document.getElementById('csvFileInput').click()" class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded-lg border border-gray-700 transition"><i class="fas fa-file-csv mr-1"></i> Upload CSV</button>
                    </div>
                </div>

                <!-- Message Payload -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Message Template</label>
                    <textarea id="camMessage" rows="5" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-indigo-500 outline-none resize-y text-sm placeholder-gray-500 transition-all" placeholder="Write your broadcast message here..."></textarea>
                </div>

                <!-- Media Attachment -->
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="flex-1">
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Media Attachment <span class="text-gray-500 normal-case ml-1 font-normal">(Optional)</span></label>
                        <input type="file" id="mediaFile" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.zip" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm file:mr-4 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-indigo-500 file:text-white hover:file:bg-indigo-600 focus:outline-none focus:ring-2 focus:ring-indigo-500" onchange="autoDetectMediaType(this)">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Media Type</label>
                        <select id="mediaType" class="w-full bg-gray-800 border-gray-700 text-white rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none px-4 py-3 text-sm border transition-shadow min-w-[150px]">
                            <option value="none">None</option>
                            <option value="image">Image</option>
                            <option value="video">Video</option>
                            <option value="audio">Audio</option>
                            <option value="document">Document</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="p-6 border-t border-gray-800 bg-gray-900/50 flex justify-end gap-3 sticky bottom-0 z-10 w-full mt-auto">
                <button onclick="closeModal()" class="px-5 py-2.5 rounded-xl text-sm font-bold text-gray-300 bg-gray-800 border border-gray-700 hover:bg-gray-700 transition">Cancel</button>
                <button id="saveBtn" onclick="submitCampaign()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-xl text-sm font-bold border border-indigo-500 transition-all flex items-center justify-center min-w-[120px]">
                    Launch
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast flex items-start flex-col gap-1 min-w-[250px]">
        <div class="flex w-full items-center justify-between">
            <strong id="toastTitle" class="text-sm">Notification</strong>
            <i class="fas fa-bell text-emerald-400"></i>
        </div>
        <span id="toastMessage" class="text-xs text-gray-300">Message goes here</span>
    </div>

    <script>
        const modal = document.getElementById("campaignModal");
        const container = document.getElementById("campaignsContainer");
        const sessionSelect = document.getElementById("camSession");

        function showToast(title, message, isError = false) {
            const t = document.getElementById("toast");
            document.getElementById("toastTitle").textContent = title;
            document.getElementById("toastTitle").className = `text-sm ${isError ? 'text-rose-400' : 'text-emerald-400'}`;
            document.getElementById("toastMessage").textContent = message;
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 3000);
        }

        function openModal() {
            modal.classList.remove("hidden");
            // Delay adding opacity to allow display:block to apply first
            setTimeout(() => {
                modal.classList.remove("opacity-0", "pointer-events-none");
                modal.querySelector("div").classList.remove("scale-95");
            }, 10);
            fetchSessions();
        }

        function closeModal() {
            modal.classList.add("opacity-0", "pointer-events-none");
            modal.querySelector("div").classList.add("scale-95");
            setTimeout(() => {
                modal.classList.add("hidden");
            }, 300);
        }

        async function fetchSessions() {
            try {
                const res = await fetch("/api/session/list");
                const data = await res.json();
                if (data.sessions) {
                    sessionSelect.innerHTML = '<option value="">-- Choose Connected Session --</option>';
                    const connected = data.sessions.filter(s => s.status === 'CONNECTED');
                    connected.forEach(s => {
                        sessionSelect.innerHTML += `<option value="${s._id}">${s._id.substring(s._id.length-6)} (Active)</option>`;
                    });
                    if(connected.length === 0) {
                         sessionSelect.innerHTML = '<option value="">No Active Sessions Found</option>';
                    }
                }
            } catch (err) {
                console.error("Failed to load sessions", err);
            }
        }

        async function loadCampaigns() {
            try {
                const res = await fetch("/api/campaign");
                const data = await res.json();
                if (data.success) {
                    renderCampaigns(data.campaigns);
                }
            } catch (err) {
                container.innerHTML = `<div class="col-span-full py-10 text-center text-rose-400">Failed to load campaigns</div>`;
            }
        }

        function getStatusColor(status) {
            switch(status) {
                case 'RUNNING': return 'text-emerald-400 bg-emerald-400/10 border-emerald-400/20';
                case 'PAUSED': return 'text-amber-400 bg-amber-400/10 border-amber-400/20';
                case 'COMPLETED': return 'text-indigo-400 bg-indigo-400/10 border-indigo-400/20';
                default: return 'text-gray-400 bg-gray-400/10 border-gray-400/20';
            }
        }

        function getStatusIcon(status) {
            switch(status) {
                case 'RUNNING': return '<i class="fas fa-bolt mr-1"></i>';
                case 'PAUSED': return '<i class="fas fa-pause-circle mr-1"></i>';
                case 'COMPLETED': return '<i class="fas fa-check-circle mr-1"></i>';
                default: return '<i class="fas fa-clock mr-1"></i>';
            }
        }

        function renderCampaigns(campaigns) {
            if (campaigns.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-20 bg-gray-900 border border-gray-800 rounded-2xl text-center flex flex-col items-center justify-center">
                        <div class="w-16 h-16 bg-gray-800 rounded-full flex items-center justify-center mb-4 text-gray-600">
                            <i class="fas fa-bullhorn text-2xl"></i>
                        </div>
                        <h3 class="text-white font-bold mb-1">No campaigns yet</h3>
                        <p class="text-sm text-gray-500 max-w-sm mb-4">Start your first anti-ban bulk messaging campaign to reach your audience safely.</p>
                        <button onclick="openModal()" class="text-indigo-400 font-medium hover:text-indigo-300 transition">Create One Now <i class="fas fa-arrow-right text-xs ml-1"></i></button>
                    </div>
                `;
                return;
            }

            container.innerHTML = "";
            campaigns.forEach(c => {
                const percent = c.totalContacts === 0 ? 0 : Math.round((c.sentContacts / c.totalContacts) * 100);
                
                let actionBtn = '';
                if (c.status === 'RUNNING') {
                    actionBtn = `<button onclick="updateStatus('${c._id}', 'PAUSED')" class="w-full mt-4 bg-gray-800 hover:bg-amber-600/20 hover:text-amber-500 hover:border-amber-500/50 text-gray-300 px-4 py-2 rounded-xl text-xs font-bold border border-gray-700 transition flex items-center justify-center gap-2"><i class="fas fa-pause"></i> Pause Campaign</button>`;
                } else if (c.status === 'PAUSED' || c.status === 'PENDING') {
                    actionBtn = `<button onclick="updateStatus('${c._id}', 'RUNNING')" class="w-full mt-4 bg-gray-800 hover:bg-emerald-600/20 hover:text-emerald-500 hover:border-emerald-500/50 text-gray-300 px-4 py-2 rounded-xl text-xs font-bold border border-gray-700 transition flex items-center justify-center gap-2"><i class="fas fa-play"></i> Resume Campaign</button>`;
                } else {
                    actionBtn = `<button disabled class="w-full mt-4 bg-gray-800/50 text-gray-500 px-4 py-2 rounded-xl text-xs font-bold border border-gray-800 transition flex items-center justify-center gap-2 cursor-not-allowed">Completed</button>`;
                }

                container.innerHTML += `
                    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-5 shadow-xl hover:border-gray-700 transition-colors flex flex-col">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="font-bold text-white text-base truncate pr-2">${c.name}</h3>
                                <p class="text-xs text-gray-500 mt-0.5" title="Session ${c.session?._id}">Session: ${c.session?._id?.substring(c.session._id.length-6) || 'Unknown'}</p>
                            </div>
                            <span class="px-2.5 py-1 rounded-md text-[10px] font-bold border flex items-center whitespace-nowrap ${getStatusColor(c.status)}">
                                ${getStatusIcon(c.status)} ${c.status}
                            </span>
                        </div>
                        
                        <div class="flex-1">
                            <p class="text-sm text-gray-400 line-clamp-3 mb-4 bg-gray-800/50 p-2.5 rounded-lg border border-gray-800/80 italic">"${c.messageText}"</p>
                        </div>
                        
                        <div class="mt-auto pt-2">
                            <div class="flex justify-between text-xs mb-1">
                                <span class="text-gray-400">Progress</span>
                                <span class="font-bold text-white">${c.sentContacts} / ${c.totalContacts} <span class="text-gray-500 font-normal">(${percent}%)</span></span>
                            </div>
                            <div class="progress-bar-bg shrink-0">
                                <div class="progress-bar-fill" style="width: ${percent}%;"></div>
                            </div>
                            <div class="flex justify-between text-[11px] mt-2">
                                <span class="text-emerald-400"><i class="fas fa-check mr-1"></i>${c.sentContacts} Sent</span>
                                <span class="text-rose-400"><i class="fas fa-times mr-1"></i>${c.failedContacts} Failed</span>
                                <span class="text-amber-400"><i class="fas fa-hourglass-half mr-1"></i>${c.totalContacts - c.sentContacts - c.failedContacts} Pending</span>
                            </div>
                            
                            <div class="flex gap-2">
                                ${actionBtn}
                                <button onclick="deleteCampaign('${c._id}')" class="mt-4 bg-gray-800 hover:bg-rose-600 hover:border-rose-500 text-gray-400 hover:text-white px-3 py-2 rounded-xl text-xs font-bold border border-gray-700 transition flex items-center justify-center"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

            // CSV Parse Handler
            const csvDropzone = document.getElementById('csvDropzone');
            csvDropzone.addEventListener('dragover', (e) => { e.preventDefault(); csvDropzone.classList.add('border-indigo-500'); });
            csvDropzone.addEventListener('dragleave', () => { csvDropzone.classList.remove('border-indigo-500'); });
            csvDropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                csvDropzone.classList.remove('border-indigo-500');
                if (e.dataTransfer.files.length) processCSV(e.dataTransfer.files[0]);
            });

            window.handleCSVSelect = function(e) {
                if(e.target.files.length) processCSV(e.target.files[0]);
            };

            function processCSV(file) {
                Papa.parse(file, {
                    complete: function(results) {
                        const parsedNumbers = results.data.map(row => row[0]).filter(Boolean).join('\\n');
                        const extArea = document.getElementById("camNumbers");
                        extArea.value = extArea.value ? extArea.value + "\\n" + parsedNumbers : parsedNumbers;
                        showToast("Success", "CSV numbers extracted!");
                    }
                });
            }

        function autoDetectMediaType(input) {
            if (!input.files || !input.files.length) return;
            const mime = input.files[0].type;
            const sel = document.getElementById('mediaType');
            if (mime.startsWith('image/')) sel.value = 'image';
            else if (mime.startsWith('video/')) sel.value = 'video';
            else if (mime.startsWith('audio/')) sel.value = 'audio';
            else sel.value = 'document';
        }

        async function submitCampaign() {
            const btn = document.getElementById("saveBtn");
            const sessionId = sessionSelect.value;
            const name = document.getElementById("camName").value;
            const messageText = document.getElementById("camMessage").value;
            const numbersRaw = document.getElementById("camNumbers").value;
            
            const mediaFileInput = document.getElementById("mediaFile");
            let mediaType = document.getElementById("mediaType").value;

            if(!sessionId || !name || !messageText || !numbersRaw) {
                return showToast("Error", "All fields are required.", true);
            }

            // Parse numbers (split by comma or newline)
            const numbers = numbersRaw.split(/[\n,]+/).map(n => n.trim()).filter(n => n);

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Uploading...`;

            try {
                let mediaUrl = null;
                if(mediaFileInput.files && mediaFileInput.files.length > 0) {
                    showToast("Uploading", "Uploading media file...");
                    const formData = new FormData();
                    formData.append("media", mediaFileInput.files[0]);
                    const uploadRes = await fetch("/api/upload", { method: "POST", body: formData });
                    const uploadData = await uploadRes.json();
                    console.log('[Campaign] Upload response:', uploadData);
                    if(!uploadData.success) throw new Error("File upload failed: " + (uploadData.error || 'unknown'));
                    mediaUrl = uploadData.url;           // e.g. /uploads/media-xxxxx.jpg
                    mediaType = uploadData.mediaType;   // use server-detected type (more reliable)
                    console.log('[Campaign] mediaUrl:', mediaUrl, 'mediaType:', mediaType);
                }

                btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Launching...`;

                const res = await fetch("/api/campaign", {
                    method: "POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({ sessionId, name, messageText, numbers, mediaUrl, mediaType })
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast("Success", "Campaign launched in background!");
                    closeModal();
                    // Clear inputs
                    document.getElementById("camName").value = '';
                    document.getElementById("camNumbers").value = '';
                    document.getElementById("camMessage").value = '';
                    document.getElementById("mediaFile").value = '';
                    document.getElementById("mediaType").value = 'none';
                    loadCampaigns();
                } else {
                    showToast("Error", data.error || "Failed to launch", true);
                }
            } catch (err) {
                console.error('[Campaign] submitCampaign error:', err);
                showToast("Error", err.message || "Network error.", true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `Launch`;
            }
        }

        window.updateStatus = async function(id, newStatus) {
            try {
                const res = await fetch(`/api/campaign/${id}/status`, {
                    method: "PUT",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({ status: newStatus })
                });
                const data = await res.json();
                if(data.success) {
                    showToast("Success", `Campaign ${newStatus.toLowerCase()} successfully.`);
                    loadCampaigns();
                } else {
                    showToast("Error", data.error || "Failed update", true);
                }
            } catch (err) {
                showToast("Error", "Network error.", true);
            }
        }

        let _pendingDeleteId = null;

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('show');
            document.getElementById('deleteModal').style.display = 'none';
            _pendingDeleteId = null;
        }

        window.deleteCampaign = function(id) {
            _pendingDeleteId = id;
            const modal = document.getElementById('deleteModal');
            modal.style.display = 'flex';
            modal.classList.add('show');
            document.getElementById('deleteConfirmBtn').onclick = async function() {
                closeDeleteModal();
                try {
                    const res = await fetch(`/api/campaign/${_pendingDeleteId || id}`, { method: "DELETE" });
                    const data = await res.json();
                    if(data.success) {
                        showToast("Deleted", "Campaign removed successfully.");
                        loadCampaigns();
                    } else {
                        showToast("Error", data.error || "Delete failed.", true);
                    }
                } catch (err) {
                    showToast("Error", "Network error.", true);
                }
            };
        }

        // Initialize fetch
        document.getElementById('deleteCancelBtn').addEventListener('click', closeDeleteModal);
        loadCampaigns();
        
        // Auto-refresh stats every 8 seconds
        setInterval(loadCampaigns, 8000);

    </script>
</body>
</html>
